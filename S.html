<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ساعة abdo213 | برو</title>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@900&family=Inter:wght@400;700&display=swap" rel="stylesheet">

    <style>
        :root {
            --bg-gradient: linear-gradient(45deg, #1a2a6c, #b21f1f, #fdbb2d);
            --glass-bg: rgba(255, 255, 255, 0.1);
            --text-color: white;
            --border-color: rgba(255, 255, 255, 0.2);
            --font-ar: 'Generator Black', 'Cairo', sans-serif;
            --font-en: 'Google Sans', 'Product Sans', 'Inter', sans-serif;
        }

        /* السمات */
        [data-theme="dark"] { --bg-gradient: linear-gradient(135deg, #0f0f0f, #2c3e50); }
        [data-theme="light"] { --bg-gradient: linear-gradient(135deg, #f5f7fa, #c3cfe2); --text-color: #2c3e50; --glass-bg: rgba(255, 255, 255, 0.6); --border-color: rgba(0, 0, 0, 0.1); }
        [data-theme="desert"] { --bg-gradient: linear-gradient(135deg, #d4b08c, #e5d3b3, #a68d5f); }
        [data-theme="color"] { --bg-gradient: linear-gradient(45deg, #ff00cc, #3333ff); }
        [data-theme="nature"] { --bg-gradient: linear-gradient(135deg, #11998e, #38ef7d); }

        body {
            background: var(--bg-gradient);
            background-size: 400% 400%;
            animation: gradientBG 15s ease infinite;
            display: flex; justify-content: space-between;
            height: 100vh; margin: 0;
            font-family: var(--font-ar); color: var(--text-color);
            transition: 0.5s; overflow: hidden;
        }

        @keyframes gradientBG { 0% { background-position: 0% 50%; } 50% { background-position: 100% 50%; } 100% { background-position: 0% 50%; } }

        /* الأشرطة الجانبية */
        .side-panel { width: 280px; padding: 20px; display: flex; flex-direction: column; justify-content: space-between; z-index: 10; transition: 0.5s; }
        .widget { background: var(--glass-bg); backdrop-filter: blur(30px); border: 1px solid var(--border-color); border-radius: 20px; padding: 15px; box-shadow: 0 8px 25px rgba(0,0,0,0.2); margin-bottom: 15px; }
        .widget-title { font-size: 1rem; font-weight: 900; margin-bottom: 10px; border-bottom: 1px solid var(--border-color); padding-bottom: 5px; }

        /* المحتوى الرئيسي */
        .main-wrapper { flex: 1; display: flex; flex-direction: column; align-items: center; padding: 20px; position: relative; transition: 0.5s; }

        /* اسم الموقع بمستطيل دائري */
        .top-site-name {
            background: var(--glass-bg);
            padding: 12px 35px;
            border-radius: 50px; /* جعل المستطيل دائري الأطراف بالكامل */
            font-weight: 900;
            border: 1px solid var(--border-color);
            margin-top: 10px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
        }

        /* زر التحكم الموحد */
        .center-controls { margin-top: 15px; position: relative; }
        .main-btn {
            background: var(--glass-bg); border: 1px solid var(--border-color); color: inherit;
            padding: 8px 25px; border-radius: 50px; cursor: pointer; font-weight: 900; font-size: 1.1rem;
        }

        /* قائمة الخيارات */
        .dropdown-menu {
            display: none; position: absolute; top: 110%; left: 50%; transform: translateX(-50%);
            background: rgba(255, 255, 255, 0.95); color: #333; min-width: 220px;
            border-radius: 15px; box-shadow: 0 15px 35px rgba(0,0,0,0.3); z-index: 1000; padding: 10px;
        }
        .dropdown-menu.show { display: block; }
        .menu-section { border-bottom: 1px solid #eee; padding: 8px 0; }
        .menu-item { display: block; padding: 8px 10px; text-decoration: none; color: #333; font-size: 0.9rem; border-radius: 8px; cursor: pointer; }
        .menu-item:hover { background: #f0f0f0; }

        /* الساعة */
        .clock-container { margin: auto; background: var(--glass-bg); backdrop-filter: blur(40px); padding: 50px 80px; border-radius: 40px; border: 1px solid var(--border-color); text-align: center; cursor: pointer; transition: 0.5s; }
        #time { font-size: clamp(60px, 15vw, 150px); font-weight: 900; }

        /* وضع ملء الشاشة */
        body.fullscreen-mode .side-panel, body.fullscreen-mode .top-site-name, body.fullscreen-mode .center-controls, body.fullscreen-mode .search-section { display: none; }
        body.fullscreen-mode .clock-container { transform: scale(1.4); background: transparent; border: none; box-shadow: none; backdrop-filter: none; }

        /* البحث */
        .search-section { width: 80%; max-width: 450px; display: flex; flex-direction: column; gap: 10px; margin-bottom: 20px; }
        .search-bar { background: var(--glass-bg); border: 1px solid var(--border-color); border-radius: 12px; padding: 5px 15px; display: flex; align-items: center; }
        .search-bar input { background: transparent; border: none; color: white; padding: 10px; flex: 1; outline: none; font-family: inherit; font-weight: 900; }

        .cal-day { font-size: 2.8rem; font-weight: 900; display: block; line-height: 1; margin: 5px 0; }
        .cal-sub { font-size: 0.9rem; opacity: 0.8; display: block; }
    </style>
</head>
<body>

    <div class="side-panel">
        <div class="widget">
            <div class="widget-title">🕌 الصلاة</div>
            <div id="prayerList" style="font-size: 0.9rem;">
                <div style="display:flex; justify-content:space-between; padding:4px 0;"><span>الفجر</span><span>٠٥:١٢ ص</span></div>
                <div style="display:flex; justify-content:space-between; padding:4px 0;"><span>الظهر</span><span>١٢:٢٠ م</span></div>
                <div style="display:flex; justify-content:space-between; padding:4px 0;"><span>العصر</span><span>٠٣:٤٥ م</span></div>
                <div style="display:flex; justify-content:space-between; padding:4px 0;"><span>المغرب</span><span>٠٦:١٥ م</span></div>
                <div style="display:flex; justify-content:space-between; padding:4px 0;"><span>العشاء</span><span>٠٧:٤٥ م</span></div>
            </div>
        </div>
        <div class="widget"><div class="widget-title">⏱️ ساعة إيقاف</div><div style="text-align:center; font-size: 1.5rem;">٠٠:٠٠</div></div>
    </div>

    <div class="main-wrapper">
        <div class="top-site-name">ساعة abdo213</div>

        <div class="center-controls">
            <button class="main-btn" onclick="toggleDropdown()">...</button>
            <div class="dropdown-menu" id="mainMenu">
                <div class="menu-section">
                    <div class="menu-item" onclick="setTheme('light')">☀️ فاتح</div>
                    <div class="menu-item" onclick="setTheme('dark')">🌙 داكن</div>
                    <div class="menu-item" onclick="setTheme('desert')">⏳ صحراوي</div>
                    <div class="menu-item" onclick="setTheme('color')">🎨 ملون</div>
                    <div class="menu-item" onclick="setTheme('nature')">🌿 طبيعي</div>
                </div>
                <div class="menu-section">
                    <div style="display: flex; gap: 5px;">
                        <div class="menu-item" onclick="setLang('ar')" style="flex:1; text-align:center;">AR</div>
                        <div class="menu-item" onclick="setLang('en')" style="flex:1; text-align:center;">EN</div>
                    </div>
                </div>
                <div class="menu-section">
                    <div class="menu-item" style="text-align: center; font-weight: 900;">شعارنا (ح)</div>
                </div>
            </div>
        </div>

        <div class="clock-container" onclick="toggleFullScreen()">
            <span id="time">00:00:00</span>
            <span id="ampm" style="display:block; font-size: 2rem; opacity: 0.7;">ص</span>
        </div>

        <div class="search-section">
            <form class="search-bar" action="https://www.google.com/search" method="GET"><input type="text" name="q" placeholder="Google"></form>
            <form class="search-bar" action="https://www.bing.com/search" method="GET"><input type="text" name="q" placeholder="Bing"></form>
        </div>
    </div>

    <div class="side-panel">
        <div class="widget">
            <div class="widget-title">📅 التقويم المزدوج</div>
            <div style="text-align:center;">
                <span id="hDay" class="cal-day">--</span><span id="hMonth" class="cal-sub">--</span>
                <div style="border-top:1px solid var(--border-color); margin:10px 0;"></div>
                <span id="mDay" class="cal-day">--</span><span id="mMonth" class="cal-sub">--</span>
            </div>
        </div>
        <div class="widget"><div class="widget-title">⏲️ مؤقت</div><div style="text-align:center; font-size: 1.5rem;">٠٥:٠٠</div></div>
    </div>

    <script>
        const arabicDigits = ['٠', '١', '٢', '٣', '٤', '٥', '٦', '٧', '٨', '٩'];
        const hijriMonths = ["محرم", "صفر", "ربيع الأول", "ربيع الثاني", "جمادى الأولى", "جمادى الثانية", "رجب", "شعبان", "رمضان", "شوال", "ذو القعدة", "ذو الحجة"];

        function toDigits(str) { return str.toString().replace(/[0-9]/g, w => arabicDigits[w]); }
        function toggleDropdown() { document.getElementById('mainMenu').classList.toggle('show'); }
        function setTheme(t) { document.body.setAttribute('data-theme', t); }
        function toggleFullScreen() { document.body.classList.toggle('fullscreen-mode'); }

        function updateClock() {
            const now = new Date();
            let h = now.getHours(), m = String(now.getMinutes()).padStart(2, '0'), s = String(now.getSeconds()).padStart(2, '0');
            let ampm = h >= 12 ? "م" : "ص";
            h = h % 12 || 12;
            document.getElementById('time').textContent = toDigits(`${String(h).padStart(2, '0')}:${m}:${s}`);
            document.getElementById('ampm').textContent = ampm;

            document.getElementById('mDay').textContent = toDigits(now.getDate());
            document.getElementById('mMonth').textContent = (now.getMonth()+1) + " / " + now.getFullYear() + " م";

            const hDate = new Intl.DateTimeFormat('ar-SA-u-ca-islamic-uma', {day:'numeric', month:'numeric', year:'numeric'}).format(now);
            const hParts = hDate.split('/');
            document.getElementById('hDay').textContent = toDigits(hParts[0]);
            document.getElementById('hMonth').textContent = hijriMonths[parseInt(hParts[1])-1] + " " + toDigits(hParts[2]) + " هـ";
        }

        setInterval(updateClock, 1000);
        updateClock();

        window.onclick = function(event) { if (!event.target.matches('.main-btn')) { var dropdowns = document.getElementsByClassName("dropdown-menu"); for (var i = 0; i < dropdowns.length; i++) { if (dropdowns[i].classList.contains('show')) dropdowns[i].classList.remove('show'); } } }
    </script>
</body>
</html>
